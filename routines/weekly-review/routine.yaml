name: weekly-review
version: 2
goal: >
  Curate the learning-loop state every Monday: promote candidates that have earned trust,
  demote ones that haven't held up, archive what's stale, and correct what's wrong. Emits
  lifecycle proposals only — nothing is written until a human runs `apply`.

trigger:
  type: schedule
  cron: "30 7 * * 1"        # Mondays 07:30

sources:
  - id: state
    trust: source

inputs: [date, timezone]

tools:
  shell: false
  web: false
  mcp: []

criteria: |
  Review every candidate and active record in `state`. Promote a candidate to `promoted`
  only when there is repeated, grounded evidence (cite it in `reason`); demote a `promoted`
  record back to `candidate` if it no longer holds; archive what is stale or settled; reject
  what proved false; correct a record whose text is wrong (a correction writes a new record
  that supersedes the old). Every proposal needs a one-sentence `reason`. Propose only —
  never write. Promotion is a deliberate human-reviewed act: hypothesis != truth.

outputs:
  format: markdown+json
  schema: schema.json

guards:
  write_allowed: false
  forbidden_paths: ["state/**"]
  max_files_changed: 0

learning:
  memory: memory.md
  promote: human
