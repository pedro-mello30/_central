name: task-review
version: 1
goal: >
  Daily 07:30 triage of the task backlog: surface overdue, at-risk, and unowned items,
  rank the top 5 that need human action today, and emit a ready-to-paste nudge per item.
  Runs before daily-command-center so its output can inform the morning brief.

trigger:
  type: schedule
  cron: "30 7 * * *" # 07:30 daily — 70 min before daily-command-center

sources:
  - id: tasks
    trust: source
  - id: state
    trust: context

inputs: [date, timezone]

tools:
  shell: false
  web: false
  mcp: []

criteria: |
  Classify every open task into exactly one bucket:
    overdue  — due date is before today and status is not done.
    at_risk  — due within 48 h AND no activity in the last 24 h, OR blocked with no
               unblock plan recorded.
    unowned  — no assignee and not done.
  A task may appear in only one bucket; precedence is overdue > at_risk > unowned.
  Rank top 5 across all buckets: overdue first (by due date asc), then at_risk (by due
  date asc), then unowned (by creation date asc). Never more than 5.
  For each top-5 item write one nudge sentence — direct, channel-agnostic (Linear
  comment, Slack, or DM), no filler. Anything you cannot read or are unsure about goes
  into `problems`; never invent it into top5.

outputs:
  format: markdown+json
  schema: schema.json

guards:
  write_allowed: false
  forbidden_paths: ["state/**"]
  max_files_changed: 0

learning:
  memory: memory.md
  promote: human
